<!DOCTYPE html>
<html lang="en-us">

<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>Horo Nite Melonmelody</title>
	<style>
		html,
		body {
			background: #000;
			width: 100%;
			height: 100%;
			overflow: visible;
			padding: 0;
			margin: 0;
		}

		div#gameContainer {
			background: transparent !important;
			position: absolute;
		}

		div#gameContainer canvas {
			position: absolute;
		}

		div#gameContainer canvas[data-pixel-art="true"] {
			position: absolute;
			image-rendering: optimizeSpeed;
			image-rendering: -webkit-crisp-edges;
			image-rendering: -moz-crisp-edges;
			image-rendering: -o-crisp-edges;
			image-rendering: crisp-edges;
			image-rendering: -webkit-optimize-contrast;
			image-rendering: optimize-contrast;
			image-rendering: pixelated;
			-ms-interpolation-mode: nearest-neighbor;
		}

		#loadingScreen {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: #000;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			z-index: 9999;
			font-family: Arial, sans-serif;
		}

		#loadingScreen.hidden {
			opacity: 0;
			transition: opacity 0.5s;
			pointer-events: none;
		}

		.loading-title {
			color: #fff;
			font-size: 28px;
			margin-bottom: 30px;
			font-weight: bold;
		}

		.loading-bar {
			width: 300px;
			height: 8px;
			background: rgba(255, 255, 255, 0.2);
			border-radius: 10px;
			overflow: hidden;
			margin-bottom: 15px;
		}

		.loading-progress {
			height: 100%;
			background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
			width: 0%;
			transition: width 0.3s;
			border-radius: 10px;
		}

		.loading-text {
			color: rgba(255, 255, 255, 0.7);
			font-size: 14px;
		}
	</style>
</head>

<body>
	<div id="loadingScreen">
		<div class="loading-title">Horo Nite Melonmelody</div>
		<div class="loading-bar">
			<div class="loading-progress" id="loadingProgress"></div>
		</div>
		<div class="loading-text" id="loadingText">Loading... 0%</div>
	</div>
	<div id="gameContainer">
		<canvas id="unity-canvas" data-pixel-art="false"></canvas>
		<script src="Build/Horo Nite Solksing.loader.js"></script>
		<script>
			var canvas = document.querySelector("#unity-canvas");
			var config = {
				dataUrl: "Build/Horo Nite Solksing.data",
				frameworkUrl: "Build/Horo Nite Solksing.framework.js",
				codeUrl: "Build/Horo Nite Solksing.wasm",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "",
				productName: "Horo Nite Melonmelody",
				productVersion: "0.2",
			};
			var scaleToFit;
			try {
				scaleToFit = !!JSON.parse("true");
			} catch (e) {
				scaleToFit = true;
			}
			function progressHandler(progress) {
				var percent = progress * 100;
				document.getElementById('loadingProgress').style.width = percent + '%';
				document.getElementById('loadingText').textContent = 'Loading... ' + Math.round(percent) + '%';
			}
			function onResize() {
				var container = canvas.parentElement;
				var w;
				var h;

				if (scaleToFit) {
					w = window.innerWidth;
					h = window.innerHeight;

					var r = 675 / 1200;

					if (w * r > window.innerHeight) {
						w = Math.min(w, Math.ceil(h / r));
					}
					h = Math.floor(w * r);
				} else {
					w = 1200;
					h = 675;
				}

				container.style.width = canvas.style.width = w + "px";
				container.style.height = canvas.style.height = h + "px";
				container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
				container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
			}
			createUnityInstance(canvas, config, progressHandler).then(function (instance) {
				canvas = instance.Module.canvas;
				onResize();
				
				setTimeout(function() {
					document.getElementById('loadingScreen').classList.add('hidden');
				}, 500);
			});
			window.addEventListener('resize', onResize);
			onResize();

			if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
				// Mobile device style: fill the whole browser client area with the game canvas:
				const meta = document.createElement('meta');
				meta.name = 'viewport';
				meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
				document.getElementsByTagName('head')[0].appendChild(meta);
			}
		</script>
	</div>
</body>

</html>
